# Provenance-publishing workflow for n8n-nodes-velagain.
#
# npm provenance requires a PUBLIC GitHub repo (n8n's verified program, since
# 2026-05-01, requires a provenance statement — a local `npm publish` is not
# eligible). Add an `NPM_TOKEN` (npm *automation* token) secret to this repo.
#
# Release flow: bump the version in package.json, then create a GitHub Release
# (tag v<version>). The job publishes with `--provenance`. Publishing is
# idempotent — if that version is already on npm, it is skipped (no red X),
# so re-running or releasing an already-published version succeeds cleanly.

name: Publish n8n node (provenance)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build

      - name: Publish (skip if version already on npm)
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER is already published — nothing to do."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
